<!DOCTYPE html>
<html>

<head>
	<meta charset='UTF-8'>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel='icon' href='../img/main_logo.svg'>
	<link rel='stylesheet' href='../stylesheets/headerstyle.css'>
	<link rel='stylesheet' href='../stylesheets/style.css'>

  <script>
    function change_tab(id)
    {
      //modifie le contenu du bloc vide par la page sélectionnée
      document.getElementById('page_content').innerHTML=document.getElementById(id+"_desc").innerHTML; 
    }
  </script>

</head>

<body>
	
	<!--- HEADER --->
	<div id='dynamic-header'> </div>

  <script src='../utils/jquery-4.0.0.min.js'></script>
	<script>$("#dynamic-header").load("header.html #header");</script>
	<!--- END HEADER --->

	<div class='bg'>
        

	<div class='page'>
	<!--- CONTENT --->

	<h1>
	Agrégation
	</h1>
  
  <p>
    Vous trouverez ici tout mon contenu propre à la préparation de l'agrégation de mathématiques :
    leçons, développements, que ça soit en algèbre ou en analyse.
  </p>



  <div class='tab'>
    <button class='tab_button' id='lecon_algebre' onclick="change_tab(this.id);">Leçons d'Algèbre</button>
    <button class='tab_button' id='lecon_analyse' onclick="change_tab(this.id);">Leçons d'Analyse</button>  
    <button class='tab_button' id='dev_analyse' onclick="change_tab(this.id);">Développements d'Analyse</button>  
    <button class='tab_button' id='dev_algebre' onclick="change_tab(this.id);">Développements d'Algèbre</button>  
  </div>


  <!---Liste des pages cachées a afficher grace au menu tab--->
  <div class='hidden_desc' id='lecon_algebre_desc'> </div>
  <script>$("#lecon_algebre_desc").load("subpages/lecons_algebre.html");</script>


  <div class='hidden_desc' id='lecon_analyse_desc'> </div>
  <script>$("#lecon_analyse_desc").load("subpages/lecons_analyse.html");</script>

  <div class='hidden_desc' id='dev_analyse_desc'> </div>
  <script>$("#dev_analyse_desc").load("subpages/devs_analyse.html");</script>

  <div class='hidden_desc' id='dev_algebre_desc'> </div>
  <script>$("#dev_algebre_desc").load("subpages/devs_algebre.html");</script>

  <div id="page_content">
    <!--- Empty to be filled with script  --->
  </div>
	<!--- END CONTENT --->
	</div>
	</div>
</body>
</html>
